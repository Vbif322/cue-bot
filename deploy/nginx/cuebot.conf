# nginx-конфиг для cue-bot: два HTTPS-vhost-а (сайт игрока + админка) на один Node-процесс.
# Node сам выбирает нужный SPA по заголовку Host, поэтому оба location проксируют на один
# и тот же 127.0.0.1:3000 (совпадает с ADMIN_PORT по умолчанию).
#
# Домен намеренно НЕ хранится в этом файле: server_name и пути к сертификатам вынесены в
# подключаемые сниппеты (nginx не поддерживает переменные в этих директивах). Создайте их
# на сервере из deploy/nginx/snippets/host.conf.example — в git они не добавляются.
#
# Установка (файл подключается симлинком прямо из репозитория):
#   sudo mkdir -p /etc/nginx/snippets
#   # создать /etc/nginx/snippets/cuebot-player-host.conf и cuebot-admin-host.conf
#   sudo ln -s "$(pwd)/deploy/nginx/cuebot.conf" /etc/nginx/sites-enabled/cuebot.conf
#   sudo nginx -t && sudo systemctl reload nginx

# Сайт игрока
server {
    listen 443 ssl;
    http2 on;

    include /etc/nginx/snippets/cuebot-player-host.conf;   # server_name + ssl_certificate* (не в git)
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;              # по нему Node выбирает app/dist vs admin/dist
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Админка (тот же Node-процесс, диспетчеризация по Host)
server {
    listen 443 ssl;
    http2 on;

    include /etc/nginx/snippets/cuebot-admin-host.conf;    # server_name + ssl_certificate* (не в git)
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTP → HTTPS для обоих хостов. Catch-all server_name _ не требует домена и годится, если
# сервер обслуживает только это приложение. Если на сервере есть другие сайты — замените на
# отдельные per-host блоки (server_name — из тех же сниппетов).
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
