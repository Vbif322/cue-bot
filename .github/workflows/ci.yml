name: CI

on:
  push:
    branches: [master, dev]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Eslint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Audit (non-blocking)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  # Separate job: heavy (Docker + integration) so it can't slow the fast
  # lint/typecheck/unit feedback in `build`. Runs unit + integration with
  # coverage and enforces the thresholds in vitest.config.ts.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Tests + coverage (unit + integration, thresholds)
        run: npm run test:coverage
